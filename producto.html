<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Store</title>

    <!-- *Normalize -->
     <link rel="stylesheet" href="./css/normalize.css">

    <!-- *Tipografia -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Staatliches&display=swap" rel="stylesheet">

    <!-- *Estilos -->
     <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <header class="header">
        <a href="index">
            <img class="header_logo" src="./img/logo.png" alt="Logo del sitio">
        </a>
    </header>

    <nav class="navegacion">
        <a class="navegacion_enlace" href="index">Tienda</a>
        <a class="navegacion_enlace" href="nosotros">Nosotros</a>
    </nav>

    <main class="contenedor">
        <h1>ReactJS</h1>

        <div class="camisa">
            <img class="camisa_img" src="./img/3.jpg" alt="Producto">

            <div class="camisa_contenido">
                <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Eius accusamus aliquid velit suscipit, qui ab? Ipsa eum vel fugit non?</p>

                <form class="formulario">
                    <select class="formulario_campo">
                        <option disabled selected>--Seleccionar talla--</option>
                        <option value="chica">Chica</option>
                        <option value="mediana">Mediana</option>
                        <option value="grande">Grande</option>
                    </select>

                    <input class="formulario_campo" type="number" placeholder="Cantidad" min="1">

                    <input class="formulario_submit" type="submit" value="Agregar al carrito">
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p class="footer_text">Frontend Store - Todos los derechos reservados - &copy; <span id="year"></span></p>
    </footer>
</body>

<script>
    document.getElementById("year").innerHTML = new Date().getFullYear();
</script>
</html>
